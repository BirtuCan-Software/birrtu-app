<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0a0b0f" />
  
  <!-- Ambient glow effects -->
  <circle cx="200" cy="100" r="400" fill="#ff5a1f" opacity="0.10" filter="blur(100px)" />
  <circle cx="1000" cy="600" r="500" fill="#2d8cff" opacity="0.08" filter="blur(120px)" />

  <!-- Layout Container: Left Sidebar -->
  <g transform="translate(0, 0)">
    <!-- Sidebar background -->
    <rect width="260" height="720" fill="#0d0e14" border-right="1px solid #1f212a" />
    <line x1="260" y1="0" x2="260" y2="720" stroke="#1f212a" stroke-width="1.5" />

    <!-- App Logo & Title inside Sidebar -->
    <g transform="translate(32, 40)">
      <rect width="40" height="40" rx="8" fill="#ff5a1f" />
      <text x="20" y="27" font-family="'Inter', sans-serif" font-size="20" font-weight="900" fill="#000000" text-anchor="middle">B</text>
      <text x="56" y="27" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="bold" fill="#ffffff">Birr<tspan fill="#ff5a1f">Tu</tspan></text>
    </g>

    <!-- Navigation items -->
    <g transform="translate(32, 130)">
      <!-- Dashboard Item (Active) -->
      <g transform="translate(0, 0)">
        <rect x="-12" y="-10" width="208" height="40" rx="8" fill="#ff5a1f" opacity="0.1" />
        <rect x="-12" y="-10" width="4" height="40" rx="2" fill="#ff5a1f" />
        <text x="16" y="16" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ff5a1f">❖ Dashboard</text>
      </g>

      <!-- Ledger/Transactions Item -->
      <g transform="translate(0, 56)">
        <text x="16" y="16" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#8e92a2">⇄ Transactions</text>
      </g>

      <!-- Wallets Item -->
      <g transform="translate(0, 112)">
        <text x="16" y="16" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#8e92a2">💳 Wallets &amp; Cash</text>
      </g>

      <!-- Sync / Drive Security Item -->
      <g transform="translate(0, 168)">
        <text x="16" y="16" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#8e92a2">☁ Google Drive Sync</text>
      </g>

      <!-- Settings Item -->
      <g transform="translate(0, 224)">
        <text x="16" y="16" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#8e92a2">⚙ Settings</text>
      </g>
    </g>

    <!-- Workspace Selector Footer of Sidebar -->
    <g transform="translate(20, 640)">
      <rect width="220" height="50" rx="10" fill="#14151c" stroke="#1f212a" stroke-width="1" />
      <circle cx="36" cy="25" r="12" fill="#1e293b" />
      <text x="36" y="29" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ff5a1f" text-anchor="middle">W</text>
      <text x="60" y="24" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Addis Ababa Dev</text>
      <text x="60" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#5c5f6e">Personal Workspace</text>
    </g>
  </g>

  <!-- Layout Container: Main Content Area -->
  <g transform="translate(260, 0)">
    <!-- Header bar -->
    <g transform="translate(48, 40)">
      <text x="0" y="28" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="bold" fill="#ffffff">Workspace Overview</text>
      <text x="0" y="48" font-family="'Inter', sans-serif" font-size="14" fill="#8e92a2">Ethiopian Local-First Financial Tracker &amp; Secure Ledger</text>
      
      <!-- User profile / status corner -->
      <g transform="translate(800, 4)">
        <rect width="120" height="36" rx="18" fill="#111218" stroke="#1f212a" stroke-width="1" />
        <circle cx="20" cy="18" r="10" fill="#2d8cff" opacity="0.2" />
        <text x="20" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#2d8cff" text-anchor="middle">●</text>
        <text x="38" y="22" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Connected</text>
      </g>
    </g>

    <!-- Bento Row 1: Cards -->
    <g transform="translate(48, 120)">
      <!-- Card 1: Main Balance -->
      <g transform="translate(0, 0)">
        <rect width="280" height="150" rx="16" fill="#111218" stroke="#ff5a1f" stroke-width="1.5" />
        <text x="24" y="36" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#8e92a2" letter-spacing="0.5">NET LIQUID ASSETS</text>
        <text x="24" y="84" font-family="'Space Grotesk', sans-serif" font-size="32" font-weight="bold" fill="#ffffff">46,850.00 <tspan font-size="18" fill="#ff5a1f">ETB</tspan></text>
        <rect x="24" y="110" width="94" height="20" rx="10" fill="#ff5a1f" opacity="0.1" />
        <text x="71" y="124" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ff5a1f" text-anchor="middle">Local Safe</text>
      </g>

      <!-- Card 2: Commercial Bank -->
      <g transform="translate(304, 0)">
        <rect width="280" height="150" rx="16" fill="#111218" stroke="#1f212a" stroke-width="1" />
        <text x="24" y="36" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#8e92a2" letter-spacing="0.5">COMMERCIAL BANK (CBE)</text>
        <text x="24" y="84" font-family="'Space Grotesk', sans-serif" font-size="32" font-weight="bold" fill="#ffffff">32,400.00 <tspan font-size="18" fill="#5c5f6e">ETB</tspan></text>
        <text x="24" y="124" font-family="'Inter', sans-serif" font-size="11" fill="#10b981">▲ CBE Birr Direct Link Ready</text>
      </g>

      <!-- Card 3: Telebirr -->
      <g transform="translate(608, 0)">
        <rect width="312" height="150" rx="16" fill="#111218" stroke="#1f212a" stroke-width="1" />
        <text x="24" y="36" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#8e92a2" letter-spacing="0.5">TELEBIRR DIGITAL WALLET</text>
        <text x="24" y="84" font-family="'Space Grotesk', sans-serif" font-size="32" font-weight="bold" fill="#ffffff">14,450.00 <tspan font-size="18" fill="#2d8cff">ETB</tspan></text>
        <text x="24" y="124" font-family="'Inter', sans-serif" font-size="11" fill="#2d8cff">● Direct Mobile Wallet Ledger</text>
      </g>
    </g>

    <!-- Bento Row 2: Graph & Log -->
    <g transform="translate(48, 296)">
      <!-- Large beautiful Chart container -->
      <g transform="translate(0, 0)">
        <rect width="584" height="370" rx="20" fill="#111218" stroke="#1f212a" stroke-width="1" />
        <text x="28" y="40" font-family="'Space Grotesk', sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Monthly Transaction Speed &amp; Trends</text>
        
        <!-- Graph Lines -->
        <path d="M 40,280 L 120,240 L 200,260 L 280,210 L 360,150 L 440,110 L 540,160" fill="none" stroke="#ff5a1f" stroke-width="3" />
        <path d="M 40,280 L 120,240 L 200,260 L 280,210 L 360,150 L 440,110 L 540,160 L 540,320 L 40,320 Z" fill="url(#orangeGradDesktop)" opacity="0.1" />

        <circle cx="440" cy="110" r="6" fill="#ff5a1f" />
        
        <!-- X Axis -->
        <line x1="40" y1="320" x2="540" y2="320" stroke="#1f212a" stroke-width="1.5" />
        <text x="40" y="344" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5c5f6e">MAY 01</text>
        <text x="140" y="344" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5c5f6e">MAY 08</text>
        <text x="240" y="344" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5c5f6e">MAY 15</text>
        <text x="340" y="344" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5c5f6e">MAY 22</text>
        <text x="440" y="344" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5c5f6e">MAY 29</text>
        <text x="540" y="344" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5c5f6e" text-anchor="end">JUN 05</text>
      </g>

      <!-- Live Transaction Log container -->
      <g transform="translate(608, 0)">
        <rect width="312" height="370" rx="20" fill="#111218" stroke="#1f212a" stroke-width="1" />
        <text x="24" y="40" font-family="'Space Grotesk', sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Recent Operations</text>
        
        <!-- List row 1 -->
        <g transform="translate(24, 64)">
          <rect width="264" height="60" rx="10" fill="#0d0e14" />
          <circle cx="24" cy="30" r="12" fill="#10b981" opacity="0.1" />
          <text x="24" y="34" font-family="'Inter', sans-serif" font-size="11" fill="#10b981" text-anchor="middle">▲</text>
          <text x="48" y="26" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#ffffff">CBE Transfer In</text>
          <text x="48" y="42" font-family="'Inter', sans-serif" font-size="10" fill="#5c5f6e">Today, 2:14 PM</text>
          <text x="250" y="34" font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="bold" fill="#10b981" text-anchor="end">+15,000</text>
        </g>

        <!-- List row 2 -->
        <g transform="translate(24, 136)">
          <rect width="264" height="60" rx="10" fill="#0d0e14" />
          <circle cx="24" cy="30" r="12" fill="#ef4444" opacity="0.1" />
          <text x="24" y="34" font-family="'Inter', sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">▼</text>
          <text x="48" y="26" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Telebirr Cafe Bill</text>
          <text x="48" y="42" font-family="'Inter', sans-serif" font-size="10" fill="#5c5f6e">Yesterday, 9:40 AM</text>
          <text x="250" y="34" font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="end">-850</text>
        </g>

        <!-- List row 3 -->
        <g transform="translate(24, 208)">
          <rect width="264" height="60" rx="10" fill="#0d0e14" />
          <circle cx="24" cy="30" r="12" fill="#a0a5b5" opacity="0.1" />
          <text x="24" y="34" font-family="'Inter', sans-serif" font-size="11" fill="#a0a5b5" text-anchor="middle">⚙</text>
          <text x="48" y="26" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Cash Withdrawal</text>
          <text x="48" y="42" font-family="'Inter', sans-serif" font-size="10" fill="#5c5f6e">May 29, 4:22 PM</text>
          <text x="250" y="34" font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="bold" fill="#2d8cff" text-anchor="end">2,000</text>
        </g>

        <!-- Bottom CTA inside list -->
        <text x="156" y="320" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ff5a1f" text-anchor="middle" cursor-pointer="true">View Full Ledger logs ➜</text>
      </g>
    </g>
  </g>

  <!-- Gradients definitions -->
  <defs>
    <linearGradient id="orangeGradDesktop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5a1f" stop-opacity="1" />
      <stop offset="100%" stop-color="#ff5a1f" stop-opacity="0" />
    </linearGradient>
  </defs>
</svg>
